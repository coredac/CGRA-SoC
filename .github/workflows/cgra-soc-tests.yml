name: CGRA SoC tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cgra-soc-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  cpu-cgra:
    name: CPU and CGRA Verilator tests
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configure Chipyard, VectorCGRA, and OpenFPGA environment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/scripts/setup-cgra-soc-env.sh

      - name: Syntax check generators
        run: |
          python -m py_compile \
            scripts/generate_single_cgra.py \
            scripts/generate_multi_cgra.py \
            scripts/cgra_fast_api.py \
            scripts/util/schema.py \
            scripts/openfpga/*.py \
            VectorCGRA/cgra/test/CgraTemplateRTL_single_test.py \
            VectorCGRA/multi_cgra/test/MeshMultiCgraTemplateRTL_multi_test.py

      - name: Generate canonical 4x4 CGRA RTL
        run: |
          .venv/bin/python scripts/generate_single_cgra.py \
            --arch-yaml configs/arch/arch.yaml \
            --soc-yaml configs/soc/cgra_soc.yaml

      - name: Generate fast C API headers
        run: |
          kernel_yamls=(
            configs/kernels/kernel_fir4x4_4x4.yaml
            configs/kernels/kernel_relu4x4_4x4.yaml
            configs/kernels/kernel_axpy_4x4.yaml
            configs/kernels/kernel_gemv_4x4.yaml
            configs/kernels/kernel_histogram_4x4.yaml
          )

          .venv/bin/python scripts/cgra_fast_api.py \
            --arch-yaml configs/arch/arch.yaml \
            --soc-yaml configs/soc/cgra_soc.yaml \
            "${kernel_yamls[@]}" \
            --output-dir tests/generated

      - name: Run FIR YAML SoC test
        run: |
          ./run-chipyard-cgra-test.sh --rebuild cgra-fir-yaml-4x4 2>&1 | tee cgra-fir-yaml-4x4.log
          grep -q "CGRA RoCC FIR YAML 4x4: PASS" cgra-fir-yaml-4x4.log

      - name: Run ReLU SoC test
        run: |
          ./run-chipyard-cgra-test.sh cgra-relu4x4 2>&1 | tee cgra-relu4x4.log
          grep -q "CGRA RoCC ReLU4x4 fast API: PASS" cgra-relu4x4.log

      - name: Run AXPY SoC test
        run: |
          ./run-chipyard-cgra-test.sh cgra-axpy-4x4 2>&1 | tee cgra-axpy-4x4.log
          grep -q "CGRA RoCC AXPY 4x4: PASS" cgra-axpy-4x4.log

      - name: Run GEMV SoC test
        run: |
          ./run-chipyard-cgra-test.sh cgra-gemv-4x4 2>&1 | tee cgra-gemv-4x4.log
          grep -q "CGRA RoCC GEMV 4x4: PASS" cgra-gemv-4x4.log

      - name: Run Histogram SoC test
        run: |
          ./run-chipyard-cgra-test.sh cgra-histogram-4x4 2>&1 | tee cgra-histogram-4x4.log
          grep -q "CGRA RoCC Histogram 4x4: PASS" cgra-histogram-4x4.log

      - name: Run multi-CGRA homo SoC test
        run: |
          .venv/bin/python scripts/generate_multi_cgra.py \
            --arch-yaml configs/arch/multi_cgra_homo_meshrtl.yaml \
            --soc-yaml configs/soc/multi_cgra_homo_meshrtl.yaml
          ./run-chipyard-cgra-test.sh --rebuild multi-cgra/cgra-multi-homo 2>&1 | tee cgra-multi-homo.log
          grep -q "CGRA RoCC multi homo MeshRTL: PASS" cgra-multi-homo.log

      - name: Run multi-CGRA systolic 2x2 SoC test
        run: |
          .venv/bin/python scripts/generate_multi_cgra.py \
            --arch-yaml configs/arch/multi_cgra_homo_meshrtl.yaml \
            --soc-yaml configs/soc/multi_cgra_systolic_2x2.yaml
          ./run-chipyard-cgra-test.sh --rebuild multi-cgra/cgra-multi-systolic-2x2 2>&1 | tee cgra-multi-systolic-2x2.log
          grep -q "CGRA RoCC multi systolic 2x2 MeshRTL: PASS" cgra-multi-systolic-2x2.log

      - name: Run multi-CGRA systolic 4x4 SoC test
        run: |
          .venv/bin/python scripts/generate_multi_cgra.py \
            --arch-yaml configs/arch/multi_cgra_4x4_meshrtl.yaml \
            --soc-yaml configs/soc/multi_cgra_systolic_4x4_2x2.yaml
          ./run-chipyard-cgra-test.sh --rebuild multi-cgra/cgra-multi-systolic-4x4 2>&1 | tee cgra-multi-systolic-4x4.log
          grep -q "CGRA RoCC multi systolic 4x4 MeshRTL: PASS" cgra-multi-systolic-4x4.log

      - name: Run multi-CGRA FIR scalar SoC test
        run: |
          .venv/bin/python scripts/generate_multi_cgra.py \
            --arch-yaml configs/arch/multi_cgra_fir_2x2_4x4_scalar.yaml \
            --soc-yaml configs/soc/multi_cgra_fir_scalar.yaml
          ./run-chipyard-cgra-test.sh --rebuild multi-cgra/fir/cgra-multi-fir-scalar 2>&1 | tee cgra-multi-fir-scalar.log
          grep -q "CGRA RoCC multi FIR scalar 4x4: PASS" cgra-multi-fir-scalar.log

      - name: Run multi-CGRA FIR scalar 2x2 SoC test
        run: |
          .venv/bin/python scripts/generate_multi_cgra.py \
            --arch-yaml configs/arch/multi_cgra_homo_meshrtl.yaml \
            --soc-yaml configs/soc/multi_cgra_fir_scalar.yaml
          ./run-chipyard-cgra-test.sh --rebuild multi-cgra/fir/cgra-multi-fir-scalar-2x2-2x2 2>&1 | tee cgra-multi-fir-scalar-2x2-2x2.log
          grep -q "CGRA RoCC multi FIR scalar 2x2-2x2: PASS" cgra-multi-fir-scalar-2x2-2x2.log

      - name: Run multi-CGRA FIR vector SoC test
        run: |
          .venv/bin/python scripts/generate_multi_cgra.py \
            --arch-yaml configs/arch/multi_cgra_fir_2x2_4x4_vector.yaml \
            --soc-yaml configs/soc/multi_cgra_fir_vector.yaml
          ./run-chipyard-cgra-test.sh --rebuild multi-cgra/fir/cgra-multi-fir-vector 2>&1 | tee cgra-multi-fir-vector.log
          grep -q "CGRA RoCC multi FIR vector 4x4: PASS" cgra-multi-fir-vector.log

      - name: Run Gemmini and CGRA ReLU demo
        run: |
          .venv/bin/python scripts/generate_single_cgra.py \
            --kernel-yaml configs/kernels/kernel_relu4x4_4x4.yaml \
            --arch-yaml configs/arch/arch.yaml \
            --soc-yaml configs/soc/cgra_soc.yaml
          .venv/bin/python scripts/cgra_fast_api.py \
            --arch-yaml configs/arch/arch.yaml \
            --soc-yaml configs/soc/cgra_soc.yaml \
            configs/kernels/kernel_relu4x4_4x4.yaml \
            --output-dir tests/generated
          ./run-chipyard-cgra-gemmini-demo.sh --rebuild 2>&1 | tee cgra-gemmini-demo.log
          grep -q "Gemmini + CGRA demo: PASS" cgra-gemmini-demo.log

      - name: Run OpenFPGA AND2 SoC test
        run: |
          .venv/bin/python scripts/openfpga/generate.py \
            --config configs/openfpga/openfpga_and2.yaml
          CONFIG=OpenFPGADemoRocketConfig ./run-chipyard-openfpga-demo.sh --rebuild openfpga-and2 2>&1 | tee openfpga-and2.log
          grep -q "OpenFPGA AND2 demo: PASS" openfpga-and2.log

      - name: Run OpenFPGA AND2_OR2 SoC test
        run: |
          .venv/bin/python scripts/openfpga/generate.py \
            --config configs/openfpga/openfpga_and2_or2_k4_frame.yaml
          CONFIG=OpenFPGAAnd2Or2K4FrameRocketConfig ./run-chipyard-openfpga-demo.sh --rebuild openfpga-and2-or2-k4-frame 2>&1 | tee openfpga-and2-or2-k4-frame.log
          grep -q "OpenFPGA AND2_OR2 k4 frame demo: PASS" openfpga-and2-or2-k4-frame.log

      - name: Run OpenFPGA bin2bcd SoC test
        run: |
          .venv/bin/python scripts/openfpga/generate.py \
            --config configs/openfpga/openfpga_fabric_k4_frame_4x4_w40.yaml \
            --benchmark bin2bcd
          CONFIG=OpenFPGABin2BcdK4FrameRocketConfig ./run-chipyard-openfpga-demo.sh --rebuild openfpga-bin2bcd-k4-frame 2>&1 | tee openfpga-bin2bcd-k4-frame.log
          grep -q "OpenFPGA bin2bcd k4 frame demo: PASS" openfpga-bin2bcd-k4-frame.log

      - name: Run OpenFPGA gcd6 SoC test
        run: |
          .venv/bin/python scripts/openfpga/generate.py \
            --config configs/openfpga/openfpga_fabric_k4_frame_4x4_w40.yaml \
            --benchmark gcd6
          CONFIG=OpenFPGAGcd6K4FrameRocketConfig ./run-chipyard-openfpga-demo.sh --rebuild openfpga-gcd6-k4-frame 2>&1 | tee openfpga-gcd6-k4-frame.log
          grep -q "OpenFPGA gcd6 k4 frame demo PASS" openfpga-gcd6-k4-frame.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cgra-soc-test-logs
          path: |
            *.log
            chipyard/build-setup.log
            tests/generated/*.h
            build/openfpga/*/*.json
          if-no-files-found: ignore
