kernel:
  name: gemv
  kernel_yaml: VectorCGRA/validation/test/gemv/gemv.yaml
  dfg_yaml: VectorCGRA/validation/test/gemv/gemv-v4-dfg.yaml

cgra:
  x_tiles: 4
  y_tiles: 4
  num_cgra_columns: 4
  num_cgra_rows: 1
  config_mem_size: 11

interface:
  num_tile_inports: 4
  num_tile_outports: 4
  num_fu_inports: 4
  num_fu_outports: 2
  data_nbits: 32
  predicate_nbits: 1

memory:
  data_mem_size_global: 256
  data_mem_size_per_bank: 32
  num_banks_per_cgra: 2
  num_registers_per_reg_bank: 8
  mem_access_is_combinational: true

execution:
  compiled_ii: 11
  loop_times: 196

hardware:
  fu_list:
    - AdderRTL
    - MulRTL
    - DivRTL
    - LogicRTL
    - ShifterRTL
    - PhiRTL
    - CompRTL
    - GrantRTL
    - MemUnitRTL
    - SelRTL
    - RetRTL
